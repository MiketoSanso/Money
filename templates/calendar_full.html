{% extends "base.html" %}
{% block content %}
<h1>Расписание студии</h1>
<div class="row">
    <div class="col-md-8">
        <div id="calendar"></div>
    </div>
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">Бронирование</div>
            <div class="card-body">
                <form id="bookingForm">
                    <div class="mb-2">
                        <label>Фотограф</label>
                        <select id="photographer_id" class="form-control">
                            <option value="2">Иванов Иван</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label>Дата</label>
                        <input type="date" id="booking_date" class="form-control">
                    </div>
                    <div class="mb-2">
                        <label>Время</label>
                        <select id="time_slot" class="form-control">
                            <option value="10:00">10:00</option>
                            <option value="11:00">11:00</option>
                            <option value="12:00">12:00</option>
                            <option value="13:00">13:00</option>
                            <option value="14:00">14:00</option>
                            <option value="15:00">15:00</option>
                            <option value="16:00">16:00</option>
                            <option value="17:00">17:00</option>
                            <option value="18:00">18:00</option>
                            <option value="19:00">19:00</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label>Заказ ID</label>
                        <input type="number" id="order_id" class="form-control" placeholder="ID заказа">
                    </div>
                    <button type="button" class="btn btn-primary" onclick="bookSlot()">Забронировать</button>
                </form>
                <div id="message" class="mt-2"></div>
            </div>
        </div>
    </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
        events: '/api/slots'
    });
    calendar.render();
    window.calendar = calendar;
});

function bookSlot() {
    let data = {
        photographer_id: document.getElementById('photographer_id').value,
        date: document.getElementById('booking_date').value,
        time_slot: document.getElementById('time_slot').value,
        order_id: document.getElementById('order_id').value
    };
    fetch('/api/book-slot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        document.getElementById('message').innerHTML = res.message || 'Успешно!';
        if (window.calendar) window.calendar.refetchEvents();
    });
}
</script>
{% endblock %}
